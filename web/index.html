<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autolingo</title>
    <!-- Monkeytype Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <div id="logo" class="logo">
                <div class="icon"><i class="fa-solid fa-keyboard"></i></div>
                <div class="text">autolingo</div>
            </div>
            <div id="menu">
                <a href="#" class="active" title="Start typing"><i class="fa-solid fa-keyboard"></i></a>
                <a href="#" id="btn-stats" title="View AI Acceptance Stats"><i class="fa-solid fa-crown"></i></a>
                <a href="#" id="btn-settings" title="Engine Settings"><i class="fa-solid fa-gear"></i></a>
            </div>
            <div id="user">
                <a href="https://github.com/Harshajaya13/mlp_autolingo" target="_blank" title="GitHub Repository"><i class="fa-brands fa-github"></i></a>
            </div>
        </header>

        <!-- Typing Area -->
        <main id="typing-area">
            <div id="words-wrapper">
                <div id="words" class="words">
                    <span id="typed-text" class="typed"></span><span id="caret" class="inline-caret">&#8203;</span><span id="predicted-text" class="prediction"></span>
                </div>
            </div>
            <!-- Invisible Input -->
            <textarea id="hidden-input" autocomplete="off" spellcheck="false" autofocus></textarea>
        </main>

        <!-- Footer -->
        <footer>
            <div class="left">
                <a href="#"><i class="fa-solid fa-code"></i> inspired by monkeytype</a>
            </div>
            <div class="right">
                <a href="#" class="shortcuts-hint"><i class="fa-solid fa-code"></i> Tab (1 word) &nbsp;&nbsp; → (All words) &nbsp;&nbsp; Esc (Clear)</a>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
